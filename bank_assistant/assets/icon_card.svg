<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="8" fill="#1E8449"/>
  <!-- Card body -->
  <rect x="4" y="9" width="24" height="15" rx="3" fill="white" opacity="0.15" stroke="white" stroke-width="1.5"/>
  <!-- Magnetic stripe -->
  <rect x="4" y="13" width="24" height="4" fill="white" opacity="0.3"/>
  <!-- Chip -->
  <rect x="7" y="10.5" width="5" height="4" rx="1" fill="#FFC107"/>
  <line x1="9.5" y1="10.5" x2="9.5" y2="14.5" stroke="#003366" stroke-width="0.8"/>
  <line x1="7" y1="12.5" x2="12" y2="12.5" stroke="#003366" stroke-width="0.8"/>
  <!-- Card number dots -->
  <circle cx="9"  cy="20" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="13" cy="20" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="17" cy="20" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="21" cy="20" r="1.2" fill="white" opacity="0.8"/>
</svg>
