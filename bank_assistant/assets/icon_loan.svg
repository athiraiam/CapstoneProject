<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="8" fill="#003366"/>
  <!-- House shape -->
  <polygon points="16,6 26,14 26,27 6,27 6,14" fill="none" stroke="#FFC107" stroke-width="2" stroke-linejoin="round"/>
  <!-- Roof peak -->
  <polyline points="4,15 16,5 28,15" fill="none" stroke="#FFC107" stroke-width="2" stroke-linecap="round"/>
  <!-- Door -->
  <rect x="13" y="19" width="6" height="8" rx="1" fill="#FFC107"/>
  <!-- Dollar sign -->
  <text x="15.5" y="26" font-family="Arial" font-size="7" font-weight="bold" fill="#003366">$</text>
</svg>
