<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Circle background -->
  <circle cx="20" cy="20" r="20" fill="#003366"/>
  <!-- Head -->
  <rect x="11" y="10" width="18" height="14" rx="4" fill="white"/>
  <!-- Eyes -->
  <circle cx="16" cy="17" r="2.5" fill="#0066CC"/>
  <circle cx="24" cy="17" r="2.5" fill="#0066CC"/>
  <!-- Eye shine -->
  <circle cx="17" cy="16" r="1" fill="white"/>
  <circle cx="25" cy="16" r="1" fill="white"/>
  <!-- Antenna -->
  <line x1="20" y1="10" x2="20" y2="6" stroke="white" stroke-width="1.5"/>
  <circle cx="20" cy="5" r="2" fill="#FFC107"/>
  <!-- Body -->
  <rect x="13" y="26" width="14" height="9" rx="3" fill="white"/>
  <!-- Body buttons -->
  <circle cx="17" cy="30" r="1.5" fill="#0066CC"/>
  <circle cx="20" cy="30" r="1.5" fill="#FFC107"/>
  <circle cx="23" cy="30" r="1.5" fill="#0066CC"/>
</svg>
